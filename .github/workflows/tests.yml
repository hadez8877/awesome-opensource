name: Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  check-resources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.head_ref }}

      - name: Install Node.js v24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        uses: ./.github/actions/pnpmCache

      - name: Checking if resources are sorted
        run: pnpm sort-resources --check-mode

      - name: Validate URLs
        run: pnpm check-urls
